name: irctest conformance

on:
  push:
    branches: [master, develop]
  pull_request:

jobs:
  irctest:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout nefarious
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libssl-dev autoconf automake flex byacc \
            libzstd-dev libcurl4-openssl-dev libjansson-dev \
            cmake pkg-config faketime

      - name: Build libmdbx
        run: |
          git clone --depth 1 https://gitflic.ru/project/erthink/libmdbx.git /tmp/libmdbx
          cd /tmp/libmdbx
          cmake -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_INSTALL_LIBDIR=lib \
            -DMDBX_BUILD_TOOLS=OFF -DMDBX_BUILD_CXX=OFF
          cmake --build build -j$(nproc)
          sudo cmake --install build

      - name: Build nefarious
        run: |
          ./configure --prefix=$HOME/.local --enable-debug \
            --with-maxcon=4096 --with-zstd=/usr --with-mdbx=/usr
          make -j$(nproc)
          echo -e "N\n\n\n\n\n\n\n\n" | make install

      - name: Checkout irctest
        uses: actions/checkout@v4
        with:
          repository: MrLenin/irctest
          path: irctest

      - name: Install irctest dependencies
        run: |
          cd irctest
          pip install -r requirements.txt pytest-xdist pytest-timeout

      - name: Run irctest
        env:
          IRCTEST_DEBUG_LOGS: '1'
        run: |
          cd irctest
          PATH=$HOME/.local/bin:$PATH \
          make nefarious PYTEST_ARGS="--junit-xml=pytest.xml --timeout=300"
        timeout-minutes: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: irctest-results
          path: irctest/pytest.xml
